<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="クイック検索">
<title>クイック検索</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --text2: rgba(255,255,255,0.55);
    --text3: rgba(255,255,255,0.25);
    --accent: #4f8ef7;
    --danger: #e24b4a;
    --radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    overflow: hidden;
  }

  .app {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 48px) 20px env(safe-area-inset-bottom, 24px);
    max-width: 480px;
    margin: 0 auto;
  }

  .header {
    padding: 12px 0 28px;
    text-align: center;
  }
  .header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 52px 16px 48px;
    font-size: 18px;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 18px;
    pointer-events: none;
  }

  .mic-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, background 0.2s;
  }
  .mic-btn:active { background: rgba(255,255,255,0.08); }
  .mic-btn.listening { color: var(--danger); animation: micPulse 1s infinite; }
  @keyframes micPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .go-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 17px;
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    letter-spacing: -0.2px;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
    margin-bottom: 28px;
  }
  .go-btn:active { opacity: 0.85; transform: scale(0.98); }

  .history-section { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    color: var(--text3);
    text-transform: uppercase;
  }
  .clear-btn {
    font-size: 13px;
    color: var(--danger);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    font-family: inherit;
  }

  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-user-select: none;
  }
  .history-item:active { background: var(--surface2); }

  .hi-text { flex: 1; font-size: 15px; color: var(--text); }
  .hi-time { font-size: 11px; color: var(--text3); }
  .hi-del {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 4px 4px 8px;
    line-height: 1;
    font-family: inherit;
    transition: color 0.15s;
  }
  .hi-del:active { color: var(--danger); }

  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--text3);
    font-size: 14px;
    line-height: 2;
  }

  .confirm-bar {
    background: rgba(226,75,74,0.12);
    border: 1px solid rgba(226,75,74,0.3);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .confirm-bar.show { display: block; }
  .confirm-bar p { font-size: 14px; color: var(--text2); margin-bottom: 12px; }
  .confirm-btns { display: flex; gap: 8px; }
  .confirm-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .confirm-btns button:active { opacity: 0.8; }
  .btn-cancel { background: var(--surface2); color: var(--text); }
  .btn-delete { background: var(--danger); color: #fff; }

  .voice-sheet {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 100;
  }
  .voice-sheet.show { opacity: 1; pointer-events: all; }
  .voice-card {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 32px 24px calc(env(safe-area-inset-bottom, 24px) + 24px);
    width: 100%;
    max-width: 480px;
    text-align: center;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  .voice-sheet.show .voice-card { transform: translateY(0); }
  .voice-ring {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--danger);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    animation: voicePulse 1.4s ease-in-out infinite;
  }
  @keyframes voicePulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(226,75,74,0.4); }
    50% { box-shadow: 0 0 0 16px rgba(226,75,74,0); }
  }
  .voice-label { font-size: 17px; color: var(--text2); margin-bottom: 8px; }
  .voice-interim { font-size: 20px; font-weight: 500; min-height: 28px; margin-bottom: 28px; color: var(--text); }
  .voice-stop {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    padding: 13px 36px;
    border-radius: 50px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>クイック検索</h1>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="q" type="search" placeholder="気になった言葉…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="mic-btn" id="micBtn" aria-label="音声入力">🎤</button>
  </div>

  <button class="go-btn" id="goBtn">Googleで検索</button>

  <div class="history-section">
    <div class="section-header">
      <span class="section-label">最近の検索</span>
      <button class="clear-btn" id="clearBtn">一括削除</button>
    </div>
    <div class="confirm-bar" id="confirmBar">
      <p>検索履歴をすべて削除しますか？</p>
      <div class="confirm-btns">
        <button class="btn-cancel" id="cancelBtn">キャンセル</button>
        <button class="btn-delete" id="deleteBtn">すべて削除</button>
      </div>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="voice-sheet" id="voiceSheet">
  <div class="voice-card">
    <div class="voice-ring">🎤</div>
    <div class="voice-label">話してください</div>
    <div class="voice-interim" id="interim"></div>
    <button class="voice-stop" id="voiceStop">完了</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'qs_history';
let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

const qEl = document.getElementById('q');
const goBtn = document.getElementById('goBtn');
const micBtn = document.getElementById('micBtn');
const clearBtn = document.getElementById('clearBtn');
const confirmBar = document.getElementById('confirmBar');
const cancelBtn = document.getElementById('cancelBtn');
const deleteBtn = document.getElementById('deleteBtn');
const historyList = document.getElementById('historyList');
const voiceSheet = document.getElementById('voiceSheet');
const voiceStop = document.getElementById('voiceStop');
const interim = document.getElementById('interim');

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); }

function timeLabel(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'たった今';
  if (diff < 3600000) return Math.floor(diff/60000) + '分前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '時間前';
  return Math.floor(diff/86400000) + '日前';
}

function render() {
  clearBtn.style.display = history.length ? '' : 'none';
  if (!history.length) {
    historyList.innerHTML = '<div class="empty">検索履歴はまだありません<br>調べたい言葉を入力してください</div>';
    return;
  }
  historyList.innerHTML = history.slice().reverse().map((item, ri) => {
    const i = history.length - 1 - ri;
    return `<div class="history-item" onclick="reuse(${i})">
      <span class="hi-text">${esc(item.q)}</span>
      <span class="hi-time">${timeLabel(item.ts)}</span>
      <button class="hi-del" onclick="event.stopPropagation();del(${i})">✕</button>
    </div>`;
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function search(q) {
  q = q.trim();
  if (!q) { qEl.focus(); return; }
  history.push({ q, ts: Date.now() });
  if (history.length > 50) history = history.slice(-50);
  save();
  render();
  window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
}

function reuse(i) { qEl.value = history[i].q; qEl.focus(); }
function del(i) { history.splice(i, 1); save(); render(); }

goBtn.addEventListener('click', () => search(qEl.value));
qEl.addEventListener('keydown', e => { if (e.key === 'Enter') search(qEl.value); });

clearBtn.addEventListener('click', () => { confirmBar.classList.add('show'); });
cancelBtn.addEventListener('click', () => confirmBar.classList.remove('show'));
deleteBtn.addEventListener('click', () => { history = []; save(); render(); confirmBar.classList.remove('show'); });

// Voice
let recognition = null;
micBtn.addEventListener('click', startVoice);
voiceStop.addEventListener('click', stopVoice);
voiceSheet.addEventListener('click', e => { if (e.target === voiceSheet) stopVoice(); });

function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('このブラウザは音声入力に対応していません。Safariをお使いください。'); return; }
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.onresult = e => {
    interim.textContent = Array.from(e.results).map(r => r[0].transcript).join('');
  };
  recognition.onend = () => {
    qEl.value = interim.textContent || qEl.value;
    stopVoice();
  };
  recognition.onerror = () => stopVoice();
  recognition.start();
  interim.textContent = '';
  voiceSheet.classList.add('show');
  micBtn.classList.add('listening');
}

function stopVoice() {
  if (recognition) { recognition.stop(); recognition = null; }
  voiceSheet.classList.remove('show');
  micBtn.classList.remove('listening');
}

render();
qEl.focus();
</script>
</body>
</html>
